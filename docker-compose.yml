services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_php
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql://appuser:apppass@db:5432/event_reservation?serverVersion=15&charset=utf8
    volumes:
      - ./symfony-app:/var/www
    depends_on:
      - db
      - mailpit
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - ./symfony-app/public:/var/www/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_network

  db:
    image: postgres:15-alpine
    container_name: symfony_db
    environment:
      - POSTGRES_DB=event_reservation
      - POSTGRES_USER=appuser
      - POSTGRES_PASSWORD=apppass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network

  mailpit:
    image: axllent/mailpit
    container_name: symfony_mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
