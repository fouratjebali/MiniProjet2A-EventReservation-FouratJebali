<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details de l'evenement - ResEvents</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="/" class="logo">ResEvents</a>

                <nav class="nav">
                    <a href="/" class="nav-link">Evenements</a>
                    <a href="/my-reservations.html" class="nav-link" id="myReservationsLink" style="display: none;">
                        Mes reservations
                    </a>
                    <div id="authButtons">
                        <button type="button" class="btn btn-outline btn-sm" onclick="window.location.href='/'">
                            Connexion
                        </button>
                    </div>
                    <div id="userMenu" style="display: none;">
                        <span id="userEmail" class="text-gray"></span>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="handleLogout()">
                            Deconnexion
                        </button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <section class="event-details" style="padding: 40px 0;">
        <div class="container">
            <div style="margin-bottom: 30px;">
                <a href="/" class="text-gray" style="transition: color 0.2s;" onmouseover="this.style.color='var(--primary-color)'" onmouseout="this.style.color='var(--gray-600)'">
                    Retour aux evenements
                </a>
            </div>

            <div id="eventContainer">
                <div style="text-align: center; padding: 60px 0;">
                    <div class="loading" style="width: 40px; height: 40px; margin: 0 auto 20px;"></div>
                    <p class="text-gray">Chargement de l'evenement...</p>
                </div>
            </div>
        </div>
    </section>

    <div id="reservationModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Reserver votre place</h3>
                <span class="modal-close" onclick="closeReservationModal()">&times;</span>
            </div>

            <div id="eventSummary" style="background: var(--gray-50); padding: 15px; border-radius: var(--radius-md); margin-bottom: 20px;"></div>

            <form id="reservationForm" onsubmit="handleReservation(event)">
                <div class="form-group">
                    <label class="form-label">Nom complet *</label>
                    <input type="text" name="name" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email *</label>
                    <input type="email" name="email" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Telephone *</label>
                    <input type="tel" name="phone" class="form-input" required placeholder="+216 12 345 678">
                    <p class="form-help">Format: +216 XX XXX XXX</p>
                </div>

                <div id="reservationError" style="display: none;" class="alert alert-error mb-3"></div>
                <div id="reservationSuccess" style="display: none;" class="alert alert-success mb-3"></div>

                <button type="submit" class="btn btn-success" style="width: 100%;">
                    Confirmer la reservation
                </button>
            </form>
        </div>
    </div>

    <footer style="background-color: var(--gray-900); color: var(--gray-400); padding: 40px 0; margin-top: 80px;">
        <div class="container">
            <div style="text-align: center;">
                <p>&copy; 2026 ResEvents. Tous droits reserves. | Projet Symfony Dev Web 2.0 3.0</p>
            </div>
        </div>
    </footer>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/event.js"></script>
</body>
</html>
