<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - ResEvents</title>

    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header admin-header">
        <div class="container">
            <div class="header-content">
                <a href="/admin/" class="logo">
                    <i class="fas fa-shield-halved"></i>
                    ResEvents
                    <span class="admin-badge">ADMIN</span>
                </a>

                <nav class="nav admin-nav">
                    <a href="/" class="nav-link" target="_blank" rel="noopener noreferrer">
                        <i class="fas fa-globe"></i>
                        Site public
                    </a>
                    <a href="/api/events" class="nav-link" target="_blank" rel="noopener noreferrer">
                        <i class="fas fa-code"></i>
                        API events
                    </a>
                </nav>
            </div>
        </div>
    </header>

    <main class="admin-auth-main">
        <div class="container">
            <section class="admin-auth-shell">
                <article class="admin-auth-card card">
                    <div class="card-content">
                        <div class="modal-header admin-auth-header">
                            <h2 class="modal-title">
                                <i class="fas fa-user-shield"></i>
                                Login admin
                            </h2>
                        </div>

                        <form id="adminLoginForm">
                            <div class="form-group">
                                <label class="form-label" for="adminEmailInput">
                                    <i class="fas fa-envelope"></i>
                                    Email admin
                                </label>
                                <input id="adminEmailInput" type="email" name="email" class="form-input" placeholder="admin@event.com" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label" for="adminPasswordInput">
                                    <i class="fas fa-lock"></i>
                                    Mot de passe
                                </label>
                                <input id="adminPasswordInput" type="password" name="password" class="form-input" placeholder="••••••••" required>
                            </div>

                            <div id="adminLoginError" class="alert alert-error mb-3" style="display: none;"></div>

                            <button id="adminLoginSubmit" type="submit" class="btn btn-primary" style="width: 100%;">
                                <i class="fas fa-arrow-right"></i>
                                Se connecter
                            </button>
                        </form>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/admin/js/login.js"></script>
</body>
</html>
