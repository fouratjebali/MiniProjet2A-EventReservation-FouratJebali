security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User:
            algorithm: auto
        App\Entity\Admin:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

        app_admin_provider:
            entity:
                class: App\Entity\Admin
                property: email

        all_users:
            chain:
                providers: ['app_user_provider', 'app_admin_provider']

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        auth_api:
            pattern: ^/api/auth/(register|login|admin/login|passkey)
            stateless: true
            security: false

        refresh:
            pattern: ^/api/token/refresh
            stateless: true
            provider: app_user_provider
            refresh_jwt:
                check_path: /api/token/refresh

        api:
            pattern: ^/api
            stateless: true
            provider: all_users
            jwt: ~

        main:
            lazy: true
            provider: app_user_provider

    access_control:
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/passkey, roles: PUBLIC_ACCESS }
        - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }

        - { path: ^/api/events$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/events/[^/]+$, roles: PUBLIC_ACCESS, methods: [GET] }
        - { path: ^/api/events, roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] }

        - { path: ^/api/reservations/event/[^/]+$, roles: ROLE_ADMIN }
        - { path: ^/api/reservations, roles: ROLE_USER }

        - { path: ^/api/auth/me, roles: ROLE_USER }
        - { path: ^/api/auth/logout, roles: ROLE_USER }

        - { path: ^/api, roles: ROLE_USER }

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
