liip_imagine:
    resolvers:
        default:
            web_path: ~

    filter_sets:
        cache: ~
        
        event_thumb:
            quality: 85
            filters:
                thumbnail: { size: [300, 200], mode: outbound }
                
        event_medium:
            quality: 90
            filters:
                thumbnail: { size: [800, 600], mode: outbound }
                
        event_large:
            quality: 95
            filters:
                thumbnail: { size: [1200, 800], mode: outbound }

    loaders:
        default:
            filesystem:
                data_root:
                    - '%kernel.project_dir%/public'